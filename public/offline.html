<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — مُذكّري الذكي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Cairo", "Tajawal", sans-serif;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.92;
      margin-bottom: 1.5rem;
    }
    button {
      background: #fff;
      color: #059669;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    button:active { transform: translateY(0); }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔕</div>
    <h1>أنت غير متصل</h1>
    <p>لا يمكن الوصول إلى تذكيراتك حالياً. تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى.</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
    <div class="hint">تذكيراتك السابقة ستظهر تلقائياً عند عودة الاتصال</div>
  </div>
</body>
</html>
